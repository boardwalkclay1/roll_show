<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Skater Dashboard – Roll Show</title>

  <!-- Correct folder path -->
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

<header class="header">
  <div class="logo">ROLL SHOW</div>

  <nav class="nav">
    <a href="create-show.html">Create Show</a>
    <a href="video-studio.html">Video Studio</a>
    <a href="branding-studio.html">Branding Studio</a>
    <button id="themeToggle">Theme</button>
  </nav>
</header>

<main class="skater-dashboard-page">

  <!-- Hero Welcome -->
  <section class="dashboard-hero">
    <h1 id="skaterWelcome">Welcome, Skater</h1>
    <p class="subtitle">Manage your shows, track your sales, and build your brand.</p>
  </section>

  <!-- Quick Actions -->
  <section class="quick-actions">
    <button class="quick-btn" onclick="window.location.href='create-show.html'">+ New Show</button>
    <button class="quick-btn" onclick="window.location.href='video-studio.html'">Open Video Studio</button>
    <button class="quick-btn" onclick="window.location.href='branding-studio.html'">Open Branding Studio</button>
  </section>

  <!-- Stats Row -->
  <section class="stats-row">
    <div class="stat-card">
      <h3>Total Shows</h3>
      <p id="statShows">0</p>
    </div>

    <div class="stat-card">
      <h3>Tickets Sold</h3>
      <p id="statTickets">0</p>
    </div>

    <div class="stat-card">
      <h3>Total Revenue</h3>
      <p id="statRevenue">$0</p>
    </div>
  </section>

  <!-- Shows List -->
  <section class="shows-section">
    <div class="section-header">
      <h2>Your Shows</h2>
      <p class="section-subtitle">Manage your published and upcoming performances.</p>
    </div>

    <div id="skaterShows" class="show-grid">
      <!-- JS injects show cards -->
    </div>
  </section>

</main>

<!-- Correct JS path -->
<script src="js/app.js" defer></script>

</body>
</html>
