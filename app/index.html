<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skate Performances</title>

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:none !important;">

  <!-- FULL CINEMATIC BACKGROUND -->
  <img src="images/roll-index.jpg" class="framed-photo" alt="Background">
  <div class="photo-overlay"></div>

  <!-- HEADER -->
  <header class="header" style="background:none !important; border:none !important;">
    <div class="logo" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">ROLL SHOW</div>

    <nav class="nav">
      <a href="auth-login.html" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">Login</a>
      <a href="buyer-profile.html" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">My Tickets</a>
      <button id="themeToggle" style="background:none; border:1px solid white; color:white;">Theme</button>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="landing-page" style="background:none !important;">

    <!-- HERO -->
    <section class="hero" style="position:relative; z-index:1;">
      <div class="hero-content">
        <h1 style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
          Skate Performances From Every Discipline
        </h1>

        <p class="subtitle" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
          Buy tickets, watch shows, support skaters, and experience the culture.
        </p>

        <a class="cta" href="auth-signup.html">Become a Skater</a>
      </div>
    </section>

    <!-- FEATURED SHOWS -->
    <section class="featured-section" style="position:relative; z-index:1;">
      <h2 style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">Featured Shows</h2>
      <div id="featuredShows" class="featured-grid"></div>
    </section>

    <!-- EXPLORE -->
    <section class="explore-section" style="position:relative; z-index:1;">
      <h2 style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">Explore All Shows</h2>
      <p class="section-subtitle" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
        Discover performances from skaters across every style and discipline.
      </p>
      <div id="showGrid" class="show-grid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer" style="background:none !important; border:none !important;">
    <p style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">© Roll Show</p>
  </footer>

  <script src="js/app.js" defer></script>

</body>
</html>
