<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skate Performances</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:black;">

  <!-- FULL BACKGROUND IMAGE (ZOOMED OUT) -->
  <img 
    src="images/roll-index.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      object-position: center top;
      z-index: 0;
      background:black;
    "
  >

  <!-- HEADER -->
  <header class="header" style="position:relative; z-index:5;">
    <div class="logo">ROLL SHOW</div>

    <nav class="nav">
      <a href="auth-login.html">Login</a>
      <a href="buyer-profile.html">My Tickets</a>
      <button id="themeToggle">Theme</button>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="landing-page" style="position:relative; z-index:5;">

    <!-- HERO -->
    <section class="hero">
      <div class="hero-content">
        <h1>Skate Performances From Every Discipline</h1>

        <p class="subtitle">
          Buy tickets, watch shows, support skaters, and experience the culture.
        </p>

        <a class="cta" href="auth-signup.html">Become a Skater</a>
      </div>
    </section>

    <!-- FEATURED SHOWS -->
    <section class="featured-section">
      <h2>Featured Shows</h2>
      <div id="featuredShows" class="featured-grid"></div>
    </section>

    <!-- EXPLORE -->
    <section class="explore-section">
      <h2>Explore All Shows</h2>
      <p class="section-subtitle">
        Discover performances from skaters across every style and discipline.
      </p>
      <div id="showGrid" class="show-grid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer" style="position:relative; z-index:5;">
    <p>© Roll Show</p>
  </footer>

  <script src="js/app.js" defer></script>

</body>
</html>
