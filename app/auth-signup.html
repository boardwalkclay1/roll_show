<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Signup</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:black;">

  <!-- FULL BACKGROUND IMAGE -->
  <img 
    src="images/roll-show.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    "
  >

  <!-- PAGE CONTENT (FLOATS ABOVE IMAGE) -->
  <main style="position: relative; z-index: 5; display: flex; justify-content: center; padding: 100px 20px;">

    <div style="width: 100%; max-width: 420px; background: transparent; border: none; box-shadow: none;">

      <h1>Create Your Account</h1>

      <form id="signupForm">
        <input type="text" id="signupName" placeholder="Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>

        <select id="signupRole" required>
          <option value="buyer">Ticket Buyer</option>
          <option value="skater">Skater</option>
        </select>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <p style="margin-top: 20px;">
        Already have an account?
        <a href="auth-login.html">Login</a>
      </p>

    </div>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
