<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Login</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:black;">

  <img 
    src="images/roll-show.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      object-position: center bottom;
      z-index: 0;
      background:black;
    "
  >

  <main style="position:relative; z-index:5; display:flex; justify-content:center; padding:100px 20px;">

    <div style="width:100%; max-width:420px; background:transparent;">

      <h1>Welcome Back</h1>

      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p style="margin-top:20px;">
        Don’t have an account?
        <a href="auth-signup.html">Create one</a>
      </p>

    </div>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
