name = "rollshow"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Top-level bindings (single environment, no env.* sections)
[[d1_databases]]
binding = "DB_roll"
database_name = "rollshow"
database_id = "c7f658f4-54f4-4717-a9de-cbb9f8e4b6ef"

[[kv_namespaces]]
binding = "KV"
id = "94027daf38234d6a914cfd48c91e55f3"

[[r2_buckets]]
binding = "R2"
bucket_name = "rollshow"

[[services]]
binding = "AUTH"
service = "rollshow-auth"
environment = "production"

# Optional top-level env vars (if you need AUTH_UPSTREAM locally, uncomment and set)
# [vars]
# AUTH_UPSTREAM = "https://rollshow-auth.boardwalkclay1.workers.dev"
