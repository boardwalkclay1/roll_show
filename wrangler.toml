name = "rollshow"
main = "worker.js"
compatibility_date = "2024-01-01"

assets = { directory = "./public" }

[[d1_databases]]
binding = "DB_users"
database_name = "roll_show"
database_id = "862b2a72-249e-4d39-bf02-55d721a41985"

[observability]
enabled = false

[observability.logs]
invocation_logs = true

# ============================================================
# SERVICE BINDING TO AUTH WORKER
# ============================================================
[[services]]
binding = "AUTH"
service = "rollshow-auth"
