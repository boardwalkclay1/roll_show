name = "rollshow"
main = "worker.js"
compatibility_date = "2024-01-01"

assets = { directory = "./public" }

# ============================================================
# D1 DATABASE
# ============================================================
[[d1_databases]]
binding = "DB_roll"
database_name = "rollshow"
database_id = "c7f658f4-54f4-4717-a9de-cbb9f8e4b6ef"

# ============================================================
# R2 BUCKET FOR REAL MEDIA
# ============================================================
[[r2_buckets]]
binding = "R2"
bucket_name = "rollshow"
preview_bucket_name = "rollshow"

# ============================================================
# KV NAMESPACE
# ============================================================
[[kv_namespaces]]
binding = "KV"
id = "94027daf38234d6a914cfd48c91e55f3"
preview_id = "94027daf38234d6a914cfd48c91e55f3"

# ============================================================
# AUTH WORKER SERVICE BINDING
# ============================================================
[[services]]
binding = "AUTH"
service = "rollshow-auth"

[observability]
enabled = false

[observability.logs]
invocation_logs = true
