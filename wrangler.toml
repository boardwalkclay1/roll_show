name = "rollshow"
main = "worker.js"
compatibility_date = "2024-01-01"

assets = { directory = "./public" }

# ============================================================
# D1 DATABASE
# ============================================================
[[d1_databases]]
binding = "DB_users"
database_name = "DB_users"
database_id = "4688d694-1a33-4055-b2a4-6f5c2231a356"

# ============================================================
# R2 BUCKET FOR REAL MEDIA (MUSIC, VIDEO, PHOTOS)
# ============================================================
[[r2_buckets]]
binding = "R2"
bucket_name = "rollshow"
preview_bucket_name = "rollshow"

# ============================================================
# KV NAMESPACE FOR METADATA + CACHING
# ============================================================
[[kv_namespaces]]
binding = "KV"
id = "94027daf38234d6a914cfd48c91e55f3"
preview_id = "94027daf38234d6a914cfd48c91e55f3"

# ============================================================
# SERVICE BINDING TO AUTH WORKER
# ============================================================
[[services]]
binding = "AUTH"
service = "rollshow-auth"

[observability]
enabled = false

[observability.logs]
invocation_logs = true
