<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login • Roll Show</title>

  <link rel="stylesheet" href="/app/styles/styles.css" />

  <!-- ONLY login.js now -->
  <script src="/app/js/login.js" defer></script>
</head>

<body>
  <main class="auth-page" id="auth-root">
    <img class="auth-bg-image" src="/img/login-bg-placeholder.jpg" alt="Login background" />

    <section class="auth-panel" aria-labelledby="auth-title">
      <h1 id="auth-title" class="auth-title">Login</h1>

      <form id="auth-login-form" autocomplete="on" novalidate>
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email" />
        </div>

        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
        </div>

        <div class="auth-actions">
          <button type="submit" class="auth-button">Log in</button>
        </div>

        <div id="auth-error" class="auth-error" role="alert" aria-live="polite" hidden></div>
      </form>

      <p class="auth-footer">
        Don’t have an account?
        <a href="/pages/auth-signup.html">Sign up</a>
      </p>
    </section>
  </main>
</body>
</html>
