<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Buyer Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/css/dashboard.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('/img/dashboard-bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>

<body>

  <!-- BURGER MENU -->
  <nav id="rs-burger-menu" class="rs-burger-menu"></nav>

  <!-- HERO -->
  <header class="rs-hero">
    <h1 id="buyer-hero-name"></h1>
    <p id="buyer-hero-subtitle"></p>
  </header>

  <!-- ANALYTICS CHIPS -->
  <section id="buyer-analytics-chips" class="rs-chip-scroll"></section>

  <!-- GHOST ACTION BUTTONS -->
  <section id="buyer-ghost-actions" class="rs-ghost-grid"></section>

  <!-- TICKETS -->
  <section class="rs-section">
    <h2>Your Tickets</h2>
    <div id="buyer-tickets-cards" class="rs-card-grid"></div>
  </section>

  <!-- FAVORITES -->
  <section class="rs-section">
    <h2>Favorites</h2>
    <div id="buyer-favorites-cards" class="rs-card-grid"></div>
  </section>

  <!-- FEED -->
  <section class="rs-section">
    <h2>Your Feed</h2>
    <div id="buyer-feed-cards" class="rs-card-grid"></div>
  </section>

<script type="module" src="/app/js/skater/skater-dashboard.js"></script>
</body>
</html>
