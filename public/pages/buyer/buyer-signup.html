<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buyer Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="stylesheet" href="/app/styles/landing.css">
</head>

<body style="background:url('/app/images/bg-buyer.jpg') center/cover no-repeat;">

  <main class="signup-shell">
    <h1>Create Buyer Account</h1>

    <form id="buyer-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>

      <button type="submit">Sign Up</button>
    </form>
  </main>

  <script type="module" src="/app/js/buyer-signup.js"></script>
</body>
</html>
