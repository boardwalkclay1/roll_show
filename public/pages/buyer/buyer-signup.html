<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buyer Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <!-- REAL CURSIVE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* BACK BUTTON — TOP LEFT */
    .back-btn {
      position:absolute;
      top:20px;
      left:20px;
      background:rgba(0,0,0,0.55);
      padding:10px 16px;
      border-radius:8px;
      color:white;
      font-weight:600;
      text-decoration:none;
      backdrop-filter:blur(4px);
      transition:.2s;
      z-index:10;
      font-family:"Dancing Script", cursive;
      font-size:22px;
    }
    .back-btn:hover {
      background:rgba(0,0,0,0.75);
    }

    /* LEARN BUTTON — WHITE + BLACK BORDER + CURSIVE */
    .learn-btn {
      display:block;
      margin-top:18px;
      text-align:center;
      padding:12px 18px;
      border-radius:10px;
      font-weight:700;
      color:#000000;
      text-decoration:none;
      background:#ffffff;
      border:3px solid #000000;
      transition:.2s;
      font-family:"Dancing Script", cursive !important;
      font-size:26px;
      letter-spacing:0.5px;
    }
    .learn-btn:hover {
      background:#f2f2f2;
      transform:translateY(-2px);
    }

    /* LOGIN LINK — SLIGHTLY BIGGER + CURSIVE */
    .signup-login-link a {
      font-family:"Dancing Script", cursive !important;
      font-size:22px;
      font-weight:700;
      color:#ffffff;
      text-decoration:underline;
    }

    .error { color:#ff4d4f; margin-top:12px; font-weight:600; display:none; }
    .signup-form input, .signup-form textarea, .signup-form button {
      display:block;
      width:100%;
      max-width:420px;
      margin:10px 0;
      padding:12px 14px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,0.12);
      font-size:16px;
    }
    .signup-form textarea { min-height:100px; resize:vertical; }
    .signup-shell { padding:48px 20px; max-width:720px; margin:0 auto; color:#fff; text-align:left; }
    h1 { font-size:36px; margin-bottom:18px; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,0.45); }
  </style>
</head>

<body data-role="buyer" style="background:url('/app/images/roll-groovy.jpg') center -10px / cover no-repeat;">

  <!-- BACK BUTTON -->
  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Create Buyer Account</h1>

    <form id="buyer-signup-form" class="signup-form" autocomplete="on" novalidate>
      <!-- users fields -->
      <input name="name" placeholder="Full Name" autocomplete="name" />
      <input name="email" type="email" placeholder="Email" required autocomplete="email" />
      <input id="password" name="password" type="password" placeholder="Password" required autocomplete="new-password" />
      <input id="password-verify" name="password_verify" type="password" placeholder="Verify Password" required autocomplete="new-password" />

      <!-- hidden role (page-specific) -->
      <input type="hidden" name="role" value="buyer" />

      <!-- profile fields (buyer) -->
      <input name="display_name" placeholder="Display Name" required />
      <textarea name="billing_address" placeholder="Billing Address (optional)"></textarea>

      <button id="buyer-signup-submit" type="submit">Sign Up</button>

      <div id="buyer-signup-error" class="error" role="alert" aria-live="polite"></div>
    </form>

    <!-- WHITE + BLACK LEARN BUTTON -->
    <a href="/pages/learn/learn-buyer.html" class="learn-btn">
      Learn More About Being a Buyer
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=buyer">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/buyer/buyer-signup.js"></script>
</body>
</html>
