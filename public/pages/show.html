<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Show – Roll Show</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- SOCIAL SHARE / LINK PREVIEW -->
  <meta property="og:title" content="Roll Show – Show">
  <meta property="og:description" content="Watch skate performances, buy tickets, and support skaters.">
  <meta property="og:image" content="/app/images/jammin.jpg">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Roll Show – Show">
  <meta name="twitter:description" content="Watch skate performances, buy tickets, and support skaters.">
  <meta name="twitter:image" content="/app/images/jammin.jpg">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- STYLES (PATH PRESERVED) -->
  <link rel="stylesheet" href="/app/styles/styles.css">

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body style="background:black;">

  <!-- BACKGROUND IMAGE -->
  <img 
    src="/app/images/jammin.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 88%;
      z-index: 0;
    "
  >

<header class="header" style="position:relative; z-index:5;">
  <div class="logo">ROLL SHOW</div>

  <nav class="nav">
    <a href="index.html">Explore</a>
    <a href="buyer-profile.html">My Tickets</a>
    <button id="themeToggle">Theme</button>
  </nav>
</header>

<main class="show-page" style="position:relative; z-index:5;">

  <!-- Hero Section -->
  <section class="show-hero">
    <div id="showHeader" class="show-header">
      <!-- JS injects: title, skater, discipline, tagline -->
    </div>
  </section>

  <!-- Video Preview -->
  <section class="show-video-section">
    <div id="showVideoPreview" class="video-preview">
      <!-- JS injects preview or thumbnail -->
    </div>

    <div class="show-meta">
      <p><strong>Discipline:</strong> <span id="metaDiscipline">—</span></p>
      <p><strong>Duration:</strong> <span id="metaDuration">20 minutes</span></p>
      <p><strong>Premiere:</strong> <span id="metaPremiere">—</span></p>
    </div>
  </section>

  <!-- Ticket Box -->
  <section class="ticket-box">
    <h2>Buy Ticket</h2>

    <div class="ticket-price-line">
      <p class="price-label">Ticket Price</p>
      <p id="ticketPriceDisplay" class="price-value">$0</p>
    </div>

    <button id="buyTicketBtn" class="btn-primary">Buy Ticket</button>

    <p class="note">
      Your ticket will include a skater‑verified stamp and a unique QR code.
    </p>
  </section>

  <!-- Show Description -->
  <section class="show-description">
    <h2>About This Show</h2>
    <p id="showDescriptionText">
      <!-- JS injects description -->
    </p>
  </section>

</main>

<!-- Correct JS path preserved -->
<script src="/app/js/app.js" defer></script>

</body>
</html>
