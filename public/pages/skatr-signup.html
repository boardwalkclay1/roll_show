<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skater Signup</title>

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="icon" href="/app/images/icons/icon-192.png">
</head>

<body style="background:black;">

  <img 
    src="/app/images/roll-show.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 88%;
      z-index: 0;
    "
  >

  <main style="
      position:relative;
      z-index:5;
      display:flex;
      justify-content:center;
      padding:120px 20px;
    ">

    <div style="
        width:100%;
        max-width:420px;
        background:rgba(0,0,0,0.55);
        padding:40px;
        border-radius:12px;
        backdrop-filter:blur(6px);
        color:white;
      ">

      <h1 style="margin-bottom:20px;">Join as a Skater</h1>

      <form id="signupForm" style="display:flex; flex-direction:column; gap:15px;">

        <input type="text" id="signupName" placeholder="Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>

        <input type="hidden" id="signupRole" value="skater">

        <button type="submit" class="btn-primary">Create Skater Account</button>
      </form>

      <p style="margin-top:20px; text-align:center;">
        Already have an account?
        <a href="/pages/auth-login.html" style="color:white; text-decoration:underline;">Login</a>
      </p>

    </div>

  </main>

  <script src="/app/js/app.js" defer></script>
</body>
</html>
