<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artist Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <style>
    .back-btn {
      position:absolute; top:20px; left:20px;
      background:rgba(0,0,0,0.55);
      padding:10px 16px; border-radius:8px;
      color:white; font-weight:600; text-decoration:none;
      backdrop-filter:blur(4px); transition:.2s;
    }
    .back-btn:hover { background:rgba(0,0,0,0.75); }

    .learn-btn {
      display:block; margin-top:18px; text-align:center;
      background:#a200ff; color:white;
      padding:12px 18px; border-radius:8px;
      font-weight:700; text-decoration:none;
      transition:.2s;
    }
    .learn-btn:hover { background:#bb33ff; }
  </style>
</head>

<body style="background:url('/app/images/2nd-rd/roll-guitar.jpg') center/cover no-repeat;">

  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Join as an Indie Artist</h1>

    <form id="musician-signup-form" class="signup-form">
      <input name="name" placeholder="Artist Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <a href="/pages/learn/learn-musician.html" class="learn-btn">
      Learn More About Being an Artist
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=musician">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/musician/musician-signup.js"></script>
</body>
</html>
