<form id="upload-track-form" class="upload-form">
  <input name="title" placeholder="Track Title" required>
  <input name="track" type="file" accept="audio/*" required>

  <h3>Rights & Identity</h3>
  <input name="legal_name" placeholder="Legal Name (as on ID)" required>
  <input name="id_last4" placeholder="Last 4 of ID or Document #" required>

  <label class="agree-check">
    <input type="checkbox" id="rights-checkbox" required>
    I swear that I am the rights holder or have full authorization to upload and license this track, and all information provided is true.
  </label>

  <button type="submit" id="upload-btn" disabled>Upload</button>
</form>

<script type="module" src="/app/js/musician/upload-track.js"></script>
