<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner • Music Library</title>
  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="/app/styles/styles.css" />
  <link rel="stylesheet" href="/pages/owner/css/owner.css" />
  <style>
    .bg-landing { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; filter: brightness(0.35); z-index: -2; }
    .owner-shell { padding: 30px; max-width: 1500px; margin: 0 auto; color: white; }
    .page-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 5px; }
    .page-header p { opacity: 0.8; margin-bottom: 25px; }
    .section-title { margin: 25px 0 10px; font-size: 22px; font-weight: 700; border-left: 4px solid gold; padding-left: 10px; }
    .panel { background: rgba(0,0,0,0.55); border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); padding: 18px; backdrop-filter: blur(6px); }
    .layout-grid { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; }
    .filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .filters input { padding: 8px 10px; border-radius: 6px; border: none; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { text-align: left; opacity: 0.8; font-weight: 600; }
    tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
  </style>
</head>
<body>
  <img src="/favicon.png" class="bg-landing" alt="Background" />

  <div class="owner-shell">
    <header class="page-header">
      <h1>Music Library</h1>
      <p>Tracks available for shows, edits, and campaigns.</p>
    </header>

    <div class="layout-grid">
      <div>
        <h2 class="section-title">Track List</h2>
        <div class="panel">
          <div class="filters">
            <input id="trackSearch" type="text" placeholder="Search by title or artist" />
          </div>
          <div style="max-height: 500px; overflow: auto;">
            <table id="tracksTable">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Artist</th>
                  <th>Length</th>
                  <th>Usage</th>
                </tr>
              </thead>
              <tbody>
                <!-- JS injects rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div>
        <h2 class="section-title">Track Details</h2>
        <div class="panel" id="trackDetail">
          <p>Select a track to view rights, contracts, and usage history.</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/app/js/owner/music.js"></script>
</body>
</html>
