<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/pages/owner/css/owner.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('/img/owner-bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
    }

    .safe-message {
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 20px;
      margin: 40px auto;
      max-width: 600px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <header class="rs-hero">
    <h1>Platform Owner</h1>
    <p>Roll Show Control Center</p>
  </header>

  <div class="safe-message">
    <strong>Owner Dashboard Loaded (Safe Mode)</strong><br><br>
    All JavaScript and API calls are disabled so the page can load without errors.<br>
    Once you're ready, we can re‑enable features one by one.
  </div>

</body>
</html>
