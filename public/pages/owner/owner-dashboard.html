<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Owner Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/pages/owner/css/owner.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('/img/owner-bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>

<body>

  <!-- BURGER MENU -->
  <nav id="rs-burger-menu" class="rs-burger-menu"></nav>

  <!-- HERO -->
  <header class="rs-hero">
    <h1>Platform Owner</h1>
    <p>Roll Show Control Center</p>
  </header>

  <!-- ANALYTICS CHIPS -->
  <section id="owner-analytics-chips" class="rs-chip-scroll"></section>

  <!-- GHOST ACTION BUTTONS -->
  <section id="owner-ghost-actions" class="rs-ghost-grid"></section>

  <!-- RECENT USERS -->
  <section class="rs-section">
    <h2>Recent Users</h2>
    <div id="owner-recent-users" class="rs-list"></div>
  </section>

  <!-- RECENT REPORTS -->
  <section class="rs-section">
    <h2>Recent Reports</h2>
    <div id="owner-recent-reports" class="rs-list"></div>
  </section>

  <!-- RECENT ERRORS -->
  <section class="rs-section">
    <h2>System Errors</h2>
    <div id="owner-recent-errors" class="rs-list"></div>
  </section>

<script type="module" src="/app/js/owner/owner-dashboard.js"></script>
</body>
</html>
