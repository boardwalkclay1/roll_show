<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Ads Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/owner.css" />
</head>

<body>
  <div class="owner-shell">
    <aside class="owner-sidebar">
      <div class="owner-logo">ROLL SHOW</div>

      <div class="owner-nav">
        <a href="/pages/owner/owner-branding.html">Branding</a>
        <a href="/pages/owner/owner-notes.html">Owner Notes</a>
        <a href="/pages/owner/owner-ads.html" class="active">Ads</a>
        <a href="/pages/owner/owner-sponsorships.html">Sponsorships</a>

    </aside>

    <main class="owner-main">
      <section class="owner-section active">
        <div class="section-title">Ads</div>
        <div class="section-subtitle">Review ads submitted by businesses.</div>

        <div class="card">
          <h3>All Ads</h3>
          <table id="ads-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Business</th>
                <th>Type</th>

                <th>Actions</th>

            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/owner-ads.js"></script>
