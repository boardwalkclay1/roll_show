<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner • Verifications</title>
  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="/app/styles/styles.css" />
  <link rel="stylesheet" href="/pages/owner/css/owner.css" />
  <style>
    .bg-landing { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; filter: brightness(0.35); z-index: -2; }
    .owner-shell { padding: 30px; max-width: 1500px; margin: 0 auto; color: white; }
    .page-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 5px; }
    .page-header p { opacity: 0.8; margin-bottom: 25px; }
    .section-title { margin: 25px 0 10px; font-size: 22px; font-weight: 700; border-left: 4px solid gold; padding-left: 10px; }
    .panel { background: rgba(0,0,0,0.55); border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); padding: 18px; backdrop-filter: blur(6px); }
    .layout-grid { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; }
    .filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .filters input, .filters select { padding: 8px 10px; border-radius: 6px; border: none; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { text-align: left; opacity: 0.8; font-weight: 600; }
    tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: rgba(255,255,255,0.15); }
    .action-row { display: flex; gap: 10px; margin-top: 15px; }
    .btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .btn-approve { background: #0a7a2f; color: white; }
    .btn-reject { background: #a30000; color: white; }
    .btn-info { background: #c28b00; color: white; }
    textarea { width: 100%; min-height: 80px; border-radius: 8px; border: none; padding: 8px 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <img src="/favicon.png" class="bg-landing" alt="Background" />

  <div class="owner-shell">
    <header class="page-header">
      <h1>Verifications</h1>
      <p>Approve skaters, businesses, and musicians for badges and higher trust.</p>
    </header>

    <div class="layout-grid">
      <div>
        <h2 class="section-title">Pending Requests</h2>
        <div class="panel">
          <div class="filters">
            <select id="verificationType">
              <option value="">All types</option>
              <option value="skater">Skater</option>
              <option value="business">Business</option>
              <option value="musician">Musician</option>
            </select>
            <select id="verificationStatus">
              <option value="">All statuses</option>
              <option value="pending">Pending</option>
              <option value="needs_info">Needs Info</option>
            </select>
            <input id="verificationSearch" type="text" placeholder="Search by name or email" />
          </div>
          <div style="max-height: 500px; overflow: auto;">
            <table id="verificationsTable">
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Status</th>
                  <th>Requested</th>
                </tr>
              </thead>
              <tbody>
                <!-- JS injects rows -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div>
        <h2 class="section-title">Request Details</h2>
        <div class="panel" id="verificationDetail">
          <p>Select a verification request to review documents and history.</p>
        </div>
        <div class="panel" style="margin-top: 15px;">
          <h3>Decision</h3>
          <textarea id="verificationNotes" placeholder="Internal notes or message for needs info."></textarea>
          <div class="action-row">
            <button class="btn btn-approve" id="verifyApprove">Approve</button>
            <button class="btn btn-reject" id="verifyReject">Reject</button>
            <button class="btn btn-info" id="verifyNeedsInfo">Needs Info</button>
          </div>
          <div id="verificationResult" style="margin-top: 10px; font-size: 13px; opacity: 0.85;"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/app/js/owner/owner-verifications.js"></script>
</body>
</html>
