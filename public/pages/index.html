<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skate Performances</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:black;">

  <!-- FULL BACKGROUND IMAGE WITH FULL CONTROL -->
  <img 
    src="images/roll-index.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;          
      height: 100vh;         
      object-fit: cover;     
      object-position: center 88%; /* ← ADJUST THIS */
      z-index: 0;
    "
  >

  <!-- HEADER WITH CENTERED LINKS -->
  <header class="header" style="
      position:relative; 
      z-index:5; 
      width:100%; 
      display:flex; 
      justify-content:center; 
      padding:20px 0;
    ">
    
    <nav class="nav" style="
        display:flex; 
        gap:40px; 
        font-size:18px;
      ">
      <a href="auth-login.html" style="color:white;">Login</a>
      <a href="buyer-profile.html" style="color:white;">My Tickets</a>
    </nav>

  </header>

  <main class="landing-page" style="position:relative; z-index:5;">

    <section class="hero">
      <div class="hero-content">
        <h1>Skate Performances From Every Discipline</h1>

        <p class="subtitle">
          Buy tickets, watch shows, support skaters, and experience the culture.
        </p>

        <a class="cta" href="auth-signup.html">Become a Skater</a>
      </div>
    </section>

    <section class="featured-section">
      <h2>Featured Shows</h2>
      <div id="featuredShows" class="featured-grid"></div>
    </section>

    <section class="explore-section">
      <h2>Explore All Shows</h2>
      <p class="section-subtitle">
        Discover performances from skaters across every style and discipline.
      </p>
      <div id="showGrid" class="show-grid"></div>
    </section>

  </main>

  <footer class="footer" style="position:relative; z-index:5;">
    <p>© Roll Show</p>
  </footer>

  <script src="js/app.js" defer></script>
</body>
</html>
