<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skater Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <style>
    /* Top-left back button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.55);
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }
    .back-btn:hover {
      background: rgba(0,0,0,0.75);
    }

    /* Learn More button under form */
    .learn-btn {
      display: block;
      margin-top: 18px;
      text-align: center;
      background: #ff0050;
      padding: 12px 18px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .learn-btn:hover {
      background: #ff3370;
    }

    /* Mobile scaling */
    @media (max-width: 600px) {
      .signup-shell {
        transform: scale(1.15);
        transform-origin: top center;
      }
    }
  </style>
</head>

<body style="background:url('/app/images/roll-show.jpg') center -30px / cover no-repeat;">

  <!-- BACK BUTTON -->
  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Become a Skater</h1>

    <form id="skater-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <!-- LEARN MORE BUTTON (takes old back button spot) -->
    <a href="/pages/learn-skater.html" class="learn-btn">
      Learn More About Being a Skater
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=skater">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/skater/skater-signup.js"></script>
</body>
</html>
