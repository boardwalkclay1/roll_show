<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skater Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/landing.css">
</head>

<body style="background:url('/app/images/bg-skater.jpg') center/cover no-repeat;">

  <main class="signup-shell">
    <h1>Become a Skater</h1>

    <form id="skater-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>

      <h3>Recorder (optional)</h3>
      <input name="recorder_name" placeholder="Recorder Name">
      <input name="recorder_email" type="email" placeholder="Recorder Email">
      <input name="recorder_percent" type="number" placeholder="Recorder %">

      <button type="submit">Continue</button>
    </form>
  </main>

  <!-- Agreement Modal -->
  <div id="agreement-modal" class="agreement-modal hidden">
    <div class="agreement-box">
      <h2 id="agreement-title"></h2>
      <div id="agreement-text" class="agreement-content"></div>

      <label class="agree-check">
        <input type="checkbox" id="agree-checkbox">
        I agree to the terms above.
      </label>

      <button id="agree-button" disabled>Agree & Continue</button>
    </div>
  </div>

  <script type="module" src="/app/js/skater/skater-signup.js"></script>
</body>
</html>
