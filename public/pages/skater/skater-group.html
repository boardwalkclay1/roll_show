<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Group • Roll Show</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/skater.css" />
</head>
<body class="bg-skater">

  <div class="skater-shell">
    <header class="page-header">
      <div>
        <h1 id="group-name">Group Name</h1>
        <p id="group-description">Group description...</p>
      </div>
      <div class="header-actions">
        <button id="edit-group-btn" class="btn-outline">Edit</button>
        <button id="group-show-btn" class="btn-primary">Create Show</button>
      </div>
    </header>

    <main class="skater-main">
      <section class="skater-section grid-2">
        <div>
          <h2>Members</h2>
          <div id="group-members" class="mini-list"></div>
        </div>
        <div>
          <h2>Shows</h2>
          <div id="group-shows" class="mini-list"></div>
        </div>
      </section>

      <section class="skater-section">
        <h2>Feed</h2>
        <div id="group-feed" class="feed-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/js/skater/skater-group.js"></script>
</body>
</html>
