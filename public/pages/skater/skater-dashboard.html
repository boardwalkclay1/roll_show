<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Skater Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/app/styles/dashboard.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('/img/dashboard-bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>

<body>

  <!-- BURGER MENU -->
  <nav id="rs-burger-menu" class="rs-burger-menu"></nav>

  <!-- HERO -->
  <header class="rs-hero">
    <h1 id="skater-hero-name"></h1>
    <p id="skater-hero-subtitle"></p>
    <div id="skater-hero-earnings" class="rs-hero-earnings"></div>
  </header>

  <!-- ANALYTICS CHIPS -->
  <section id="skater-analytics-chips" class="rs-chip-scroll"></section>

  <!-- GHOST ACTION BUTTONS -->
  <section id="skater-ghost-actions" class="rs-ghost-grid"></section>

  <!-- SHOWS -->
  <section class="rs-section">
    <h2>Shows</h2>
    <div id="skater-shows-cards" class="rs-card-grid"></div>
  </section>

  <!-- CONTRACTS -->
  <section class="rs-section">
    <h2>Contracts</h2>
    <div id="skater-contracts-cards" class="rs-card-grid"></div>
  </section>

  <!-- BADGES -->
  <section class="rs-section">
    <h2>Badges</h2>
    <div id="skater-badges-cards" class="rs-card-grid"></div>
  </section>

  <!-- load global API first -->
  <script src="/app/js/api.js"></script>

  <!-- keep your path exactly as is -->
  <script type="module" src="/app/js/skater/skater-dashboard.js"></script>
  <script src="/app/js/dev-owner.js" defer></script>

</body>
</html>
