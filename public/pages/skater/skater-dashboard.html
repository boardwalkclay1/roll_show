<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skater Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>

<body style="background-image: url('/img/dashboard-bg.jpg');">

  <!-- BURGER MENU -->
  <nav id="rs-burger-menu" class="rs-burger-menu"></nav>

  <!-- HERO -->
  <header class="rs-hero">
    <h1 id="skater-hero-name"></h1>
    <p id="skater-hero-subtitle"></p>
    <div id="skater-hero-earnings" class="rs-hero-earnings"></div>
  </header>

  <!-- ANALYTICS CHIPS -->
  <section id="skater-analytics-chips" class="rs-chip-scroll"></section>

  <!-- GHOST ACTION BUTTONS -->
  <section id="skater-ghost-actions" class="rs-ghost-grid"></section>

  <!-- SHOWS -->
  <section class="rs-section">
    <h2>Shows</h2>
    <div id="skater-shows-cards" class="rs-card-grid"></div>
  </section>

  <!-- CONTRACTS -->
  <section class="rs-section">
    <h2>Contracts</h2>
    <div id="skater-contracts-cards" class="rs-card-grid"></div>
  </section>

  <!-- BADGES -->
  <section class="rs-section">
    <h2>Badges</h2>
    <div id="skater-badges-cards" class="rs-card-grid"></div>
  </section>

  <script src="/app/js/skater/skater-dashboard.js"></script>
</body>
</html>
