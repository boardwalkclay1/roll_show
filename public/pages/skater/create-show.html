<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Show – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body style="background:url('/app/images/bg-create-show.jpg') center/cover no-repeat;">

  <main class="dash-shell">
    <h1>Create a Show</h1>

    <form id="create-show-form" class="upload-form">
      <input name="title" placeholder="Show Title" required>
      <textarea name="description" placeholder="Description"></textarea>
      <input name="price_cents" type="number" placeholder="Price (cents)" required>
      <input name="thumbnail" placeholder="Thumbnail URL">

      <button type="submit">Create Show</button>
    </form>
  </main>

  <script type="module" src="/app/js/skater/create-show.js"></script>
</body>
</html>
