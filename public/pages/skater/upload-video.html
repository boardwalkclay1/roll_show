<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Video – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body style="background:url('/app/images/bg-upload-video.jpg') center/cover no-repeat;">

  <main class="dash-shell">
    <h1>Upload Video</h1>

    <form id="upload-video-form" class="upload-form">
      <input name="title" placeholder="Video Title" required>
      <input name="video" type="file" accept="video/*" required>
      <button type="submit">Upload</button>
    </form>
  </main>

  <script type="module" src="/app/js/upload-video.js"></script>
</body>
</html>
