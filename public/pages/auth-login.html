<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • Roll Show</title>

  <!-- your global styles -->
  <link rel="stylesheet" href="/app/styles/styles.css" />

  <!-- correct JS path (matches console: auth-login.js?v=9999) -->
  <script src="/app/js/auth-login.js?v=9999" defer></script>
</head>

<body>
  <div class="auth-page">

    <!-- 🔥 BIG BACKGROUND IMAGE (you change the src to your real one) -->
    <img
      class="auth-bg-image"
      src="/img/login-bg-placeholder.jpg"
      alt="Login background"
    />

    <!-- your login panel; style it in style.css -->
    <div class="auth-panel">
      <h1 class="auth-title">Login</h1>

      <form id="auth-login-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required />
        </div>

        <button type="submit" class="auth-button">Log in</button>
      </form>

      <p class="auth-footer">
        Don’t have an account?
        <a href="/pages/auth-signup.html">Sign up</a>
      </p>
    </div>
  </div>
</body>
</html>
