<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Login</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:black;">

  <!-- FULL BACKGROUND IMAGE WITH FULL CONTROL -->
  <img 
    src="images/roll-show.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;          /* FULL SCREEN, NO BLACK BARS */
      object-position: center 88%; /* ← ADJUST THIS (X/Y CONTROL) */
      z-index: 0;
    "
  >

  <!-- LOGIN CONTAINER -->
  <main style="
      position:relative; 
      z-index:5; 
      display:flex; 
      justify-content:center; 
      padding:120px 20px;
    ">

    <div style="
        width:100%; 
        max-width:420px; 
        background:rgba(0,0,0,0.55); 
        padding:40px; 
        border-radius:12px; 
        backdrop-filter:blur(6px);
        color:white;
      ">

      <h1 style="margin-bottom:20px;">Welcome Back</h1>

      <form id="loginForm" style="display:flex; flex-direction:column; gap:15px;">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p style="margin-top:20px; text-align:center;">
        Don’t have an account?
        <a href="auth-signup.html" style="color:white; text-decoration:underline;">Create one</a>
      </p>

    </div>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
