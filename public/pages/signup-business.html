<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Business Registration</title>
  <link rel="stylesheet" href="/app/styles/styles.css">
</head>

<body style="background:black;">

  <!-- BACKGROUND (replace path later) -->
  <img src="/app/images/roll-business.jpg" class="bg-full">

  <main class="auth-container">
    <div class="auth-box">
      <h1>Register Your Business</h1>
      <p style="margin-bottom:15px;">
        Submit your business details for verification.  
        Once approved, you’ll gain access to the Business Dashboard.
      </p>

      <form id="businessSignupForm" class="auth-form">
        <input type="text" id="bizName" placeholder="Business / Brand Name" required>
        <input type="text" id="bizOwner" placeholder="Owner / Representative Name" required>
        <input type="email" id="bizEmail" placeholder="Business Email" required>
        <input type="text" id="bizWebsite" placeholder="Website (optional)">
        <textarea id="bizDescription" placeholder="Describe your business" required></textarea>

        <input type="hidden" id="signupRole" value="business">

        <button type="submit" class="btn-primary">Submit for Verification</button>
      </form>

      <p class="auth-switch">
        Already verified?  
        <a href="/pages/auth-login.html">Login</a>
      </p>
    </div>
  </main>

  <script src="/app/js/app.js" defer></script>
</body>
</html>
