<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <style>
    .back-btn {
      position:absolute; top:20px; left:20px;
      background:rgba(0,0,0,0.55);
      padding:10px 16px; border-radius:8px;
      color:white; font-weight:600; text-decoration:none;
      backdrop-filter:blur(4px); transition:.2s;
    }
    .back-btn:hover { background:rgba(0,0,0,0.75); }

    .learn-btn {
      display:block; margin-top:18px; text-align:center;
      background:#f5b400; color:#1a1200;
      padding:12px 18px; border-radius:8px;
      font-weight:700; text-decoration:none;
      transition:.2s;
    }
    .learn-btn:hover { background:#ffca33; }
  </style>
</head>

<body style="background:url('/app/images/2nd-rd/roll-board-jump.jpg') center/contain no-repeat;">

  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Business Application</h1>

    <form id="business-apply-form" class="signup-form">
      <input name="company_name" placeholder="Company Name" required>
      <input name="website" placeholder="Website">
      <input name="phone" placeholder="Phone">
      <textarea name="address" rows="2" placeholder="Address"></textarea>
      <input name="ein" placeholder="EIN / Tax ID">
      <input name="name" placeholder="Your Name" required>
      <input name="email" placeholder="Email" required>
      <input name="password" placeholder="Password" required>
      <button type="submit">Submit Application</button>
    </form>

    <a href="/pages/learn/learn-business.html" class="learn-btn">
      Learn More About Business Accounts
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=business">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/business/business-signup.js"></script>
</body>
</html>
