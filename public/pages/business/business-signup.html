<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Business Application</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body class="rs-body">
  <main class="rs-auth-shell">
    <section class="rs-card">
      <h1 class="rs-title">Business Application</h1>
      <p class="rs-subtitle">
        Apply to join Roll Show as a verified business partner.
      </p>

      <form id="business-apply-form" class="rs-form">
        <label>
          Company Name
          <input type="text" name="company_name" required />
        </label>

        <label>
          Website
          <input type="url" name="website" placeholder="https://example.com" />
        </label>

        <label>
          Phone
          <input type="tel" name="phone" />
        </label>

        <label>
          Address
          <textarea name="address" rows="2"></textarea>
        </label>

        <label>
          EIN / Tax ID
          <input type="text" name="ein" placeholder="XX-XXXXXXX" />
        </label>

        <label>
          Your Name
          <input type="text" name="name" required />
        </label>

        <label>
          Email
          <input type="email" name="email" required />
        </label>

        <label>
          Password
          <input type="password" name="password" required />
        </label>

        <button type="submit" class="rs-btn-primary">Submit Application</button>
      </form>

      <div id="business-apply-message" class="rs-message"></div>
    </section>
  </main>

  <script src="/app/js/business/signup.js" type="module"></script>
</body>
</html>
