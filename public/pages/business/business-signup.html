<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="stylesheet" href="/app/styles/landing.css">
</head>

<body style="background:url('/app/images/bg-business.jpg') center/cover no-repeat;">

  <main class="signup-shell">
    <h1>Business / Collab Registration</h1>

    <form id="business-signup-form" class="signup-form">
      <input name="company_name" placeholder="Company Name" required>
      <input name="name" placeholder="Your Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>

      <button type="submit">Continue</button>
    </form>
  </main>

  <!-- Agreement Modal -->
  <div id="agreement-modal" class="agreement-modal hidden">
    <div class="agreement-box">
      <h2 id="agreement-title"></h2>
      <div id="agreement-text" class="agreement-content"></div>

      <label class="agree-check">
        <input type="checkbox" id="agree-checkbox">
        I agree to the terms above.
      </label>

      <button id="agree-button" disabled>Agree & Continue</button>
    </div>
  </div>

  <script type="module" src="/app/js/business-signup.js"></script>
</body>
</html>
