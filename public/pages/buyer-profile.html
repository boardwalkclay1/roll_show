<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Buyer Profile</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- SOCIAL SHARE / LINK PREVIEW -->
  <meta property="og:title" content="Roll Show – Buyer Profile">
  <meta property="og:description" content="Set up your Roll Show ticket wallet and secure your purchases.">
  <meta property="og:image" content="/app/images/roll-show.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://roll-show.pages.dev/pages/buyer-profile.html">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Roll Show – Buyer Profile">
  <meta name="twitter:description" content="Set up your Roll Show ticket wallet and secure your purchases.">
  <meta name="twitter:image" content="/app/images/roll-show.jpg">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- STYLES -->
  <link rel="stylesheet" href="/app/styles/styles.css">

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body style="background:black;">

  <!-- BACKGROUND IMAGE -->
  <img 
    src="/app/images/roll-show.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 88%;
      z-index: 0;
    "
  >

  <main style="
      position:relative;
      z-index:5;
      display:flex;
      justify-content:center;
      padding:120px 20px;
    ">

    <div style="
        width:100%;
        max-width:480px;
        background:rgba(0,0,0,0.55);
        padding:40px;
        border-radius:12px;
        backdrop-filter:blur(6px);
        color:white;
      ">

      <h1 style="margin-bottom:10px;">Complete Your Profile</h1>
      <p style="opacity:0.8; margin-bottom:25px;">
        We need a few details to set up your ticket wallet and keep your purchases secure.
      </p>

      <form id="buyerProfileForm" style="display:flex; flex-direction:column; gap:15px;">

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="(555) 555‑5555" required>

        <label>City</label>
        <input type="text" id="city" placeholder="Your city" required>

        <label>State</label>
        <input type="text" id="state" placeholder="Your state" required>

        <label>Preferred Payment Method</label>
        <select id="paymentMethod" required>
          <option value="card">Card on File</option>
          <option value="cashapp">Cash App</option>
          <option value="paypal">PayPal</option>
        </select>

        <label style="display:flex; align-items:center; gap:10px; margin-top:10px;">
          <input type="checkbox" id="agreeTerms" required>
          <span>I agree to the Roll Show ticket terms and purchase policies.</span>
        </label>

        <button type="submit" class="btn-primary">Save Profile</button>
      </form>

    </div>

  </main>

  <script src="/app/js/buyer-profile.js" defer></script>
</body>
</html>
