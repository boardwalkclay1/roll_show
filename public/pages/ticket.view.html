<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Your Ticket – Roll Show</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Correct CSS path -->
  <link rel="stylesheet" href="/app/styles/styles.css">

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body style="background:black;">

  <!-- BACKGROUND IMAGE -->
  <img 
    src="/app/images/jammin.jpg"
    alt="Background"
    style="
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 88%;
      z-index: 0;
    "
  >

<header class="header" style="position:relative; z-index:5;">
  <div class="logo">ROLL SHOW</div>

  <nav class="nav">
    <a href="/index.html">Explore</a>
    <a href="/pages/buyer-profile.html">My Tickets</a>
    <button id="themeToggle">Theme</button>
  </nav>
</header>

<main class="ticket-view-page" style="position:relative; z-index:5;">

  <!-- Page Header -->
  <section class="page-header">
    <h1>Your Ticket</h1>
    <p class="subtitle">This is your official stamped Roll Show ticket.</p>
  </section>

  <!-- Ticket Container -->
  <section class="ticket-stage">

    <div id="ticketRender" class="ticket-display">
      <!-- JS injects the full ticket layout + stamp -->
    </div>

    <div class="ticket-actions">
      <button id="downloadTicket" class="btn-primary">Download Ticket</button>
      <p class="note">Your ticket includes a unique QR code and skater‑verified stamp.</p>
    </div>

  </section>

</main>

<!-- Correct JS path -->
<script src="/app/js/app.js" defer></script>

</body>
</html>
